name: prayer_times_app
description: تطبيق مواقيت الصلاة
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Prayer Times Calculation
  adhan: ^1.0.3
  
  # Location
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  
  # Notifications
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.0
  
  # Storage
  shared_preferences: ^2.2.3
  
  # Compass / Qibla
  flutter_qiblah: ^2.1.0
  
  # Audio (Adhan sound)
  audioplayers: ^6.0.0
  
  # UI
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  animations: ^2.0.11
  
  # Hijri Calendar
  hijri: ^2.0.1
  
  # Icons
  cupertino_icons: ^1.0.6
  lucide_icons: ^0.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/images/
