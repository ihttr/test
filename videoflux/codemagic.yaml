name: videoflux
description: Video downloader & converter app with modern Material You UI.
publish_to: 'none'
version: 2.4.1+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Core UI ──────────────────────────────────────────────────────────────────
  google_fonts: ^6.1.0            # For DM Sans + Space Grotesk
  flutter_svg: ^2.0.9             # SVG icon support

  # ── HTTP & Networking ─────────────────────────────────────────────────────────
  http: ^1.2.0                    # REST calls to yt-dlp server or API
  dio: ^5.4.1                     # Advanced HTTP with download progress
  
  # ── File Handling ──────────────────────────────────────────────────────────────
  file_picker: ^8.0.0             # Pick files for conversion
  path_provider: ^2.1.2           # App storage directories
  permission_handler: ^11.3.0     # Storage & notification permissions
  open_file: ^3.3.2               # Open completed downloads
  share_plus: ^9.0.0              # Share downloaded files

  # ── Downloads ─────────────────────────────────────────────────────────────────
  flutter_downloader: ^1.11.6     # Background download service
  # Alternative: background_downloader (more modern)
  # background_downloader: ^8.5.4

  # ── Video / FFmpeg ─────────────────────────────────────────────────────────────
  ffmpeg_kit_flutter: ^6.0.3      # FFmpeg bindings for conversion
  # Note: Use ffmpeg_kit_flutter_full for all codecs
  # Use ffmpeg_kit_flutter_min for smaller APK

  # ── State Management ───────────────────────────────────────────────────────────
  provider: ^6.1.2                # Lightweight state management
  # Alternative options:
  # riverpod: ^2.5.1
  # bloc: ^8.1.4

  # ── Local Storage ──────────────────────────────────────────────────────────────
  hive_flutter: ^1.1.0            # Fast local NoSQL DB for download history
  hive: ^2.2.3
  shared_preferences: ^2.2.3     # Simple key-value settings storage

  # ── Image Loading ──────────────────────────────────────────────────────────────
  cached_network_image: ^3.3.1   # Cache video thumbnails
  
  # ── Notifications ──────────────────────────────────────────────────────────────
  flutter_local_notifications: ^17.0.0  # Download complete notifications

  # ── Utilities ─────────────────────────────────────────────────────────────────
  url_launcher: ^6.2.5           # Open URLs in browser
  package_info_plus: ^8.0.0      # App version info
  intl: ^0.19.0                  # Date/number formatting

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true

  # ── Fonts ──────────────────────────────────────────────────────────────────────
  # Option A: Use google_fonts package (downloads at runtime or bundle below)
  # Option B: Bundle fonts for offline use:
  fonts:
    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/DMSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/DMSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/DMSans-Bold.ttf
          weight: 700
    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk-Regular.ttf
          weight: 400
        - asset: assets/fonts/SpaceGrotesk-Medium.ttf
          weight: 500
        - asset: assets/fonts/SpaceGrotesk-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/SpaceGrotesk-Bold.ttf
          weight: 700

  assets:
    - assets/fonts/
    - assets/images/
    - assets/icons/
